<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Donya</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080a;
            --accent: #e5c9b2;
            --text-bright: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .aurora-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: blur(120px); opacity: 0.4;
        }

        .aura { position: absolute; border-radius: 50%; animation: drift 25s infinite alternate ease-in-out; }
        .aura-1 { width: 600px; height: 600px; background: #2d3436; top: -10%; right: -5%; }
        .aura-2 { width: 500px; height: 500px; background: #e5c9b2; bottom: -5%; left: -5%; opacity: 0.2; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 1100px;
            animation: reveal 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { text-align: center; margin-bottom: 60px; }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 9vw, 6rem);
            font-weight: 400; font-style: italic;
            background: linear-gradient(180deg, #fff 0%, var(--accent) 150%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sep { width: 40px; height: 1px; background: var(--accent); margin: 20px auto; opacity: 0.5; }

        .content-frame {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 60px 40px;
            text-align: center;
        }

        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
        }

        .nav-card {
            padding: 45px 20px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            border-radius: 40px;
            text-decoration: none;
            color: inherit;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .icon-circle {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; font-weight: 600; font-size: 0.9rem;
            transition: 0.4s;
        }

        .nav-card:hover .icon-circle { background: var(--accent); color: var(--bg); }

        footer { text-align: center; margin-top: 60px; font-size: 0.6rem; letter-spacing: 0.5em; opacity: 0.4; color: var(--text-muted); }

        @media (max-width: 900px) {
            .nav-grid { grid-template-columns: 1fr; }
            .content-frame { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="aurora-container">
        <div class="aura aura-1"></div>
        <div class="aura aura-2"></div>
    </div>

    <div class="container">
        <header>
            <p style="letter-spacing: 0.4em; text-transform: uppercase; font-size: 0.7rem; color: var(--text-muted);">Digital Portfolio</p>
            <div class="sep"></div>
            <h1>Donya</h1>
        </header>

        <main class="content-frame">
            <p style="font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 50px; font-style: italic;">
                Välkommen till mitt digitala arkiv.
            </p>
            <div class="nav-grid">
                <!-- Länk till CV -->
                <a href="cv.html" class="nav-card">
                    <div class="icon-circle">CV</div>
                    <span style="font-family: 'Playfair Display', serif; font-size: 1.3rem;">Curriculum Vitae</span>
                </a>
                
                <!-- Länk till Gymnasiearbete -->
                <a href="gymnasiearbete.html" class="nav-card">
                    <div class="icon-circle">GA</div>
                    <span style="font-family: 'Playfair Display', serif; font-size: 1.3rem;">Gymnasiearbete</span>
                </a>

                <!-- Länk till Spel -->
                <a href="games.html" class="nav-card">
                    <div class="icon-circle">JS</div>
                    <span style="font-family: 'Playfair Display', serif; font-size: 1.3rem;">Mina Spel</span>
                </a>
            </div>
        </main>

        <footer>DONYA HAWILO &bull; 2024</footer>
    </div>

</body>
</html>
